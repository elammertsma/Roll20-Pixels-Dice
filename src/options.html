<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixels Dice - Manage Commands</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>🎲 Pixels Dice - Manage Commands</h1>
    
    <div class="card">
      <h2>Custom Commands</h2>
      <ul id="commandList" class="die-list"></ul>
    </div>
    
    <div class="card">
      <h2>Tools</h2>
      <div style="display: flex; gap: 12px;">
        <button class="btn-primary" id="importBtn" style="background: var(--warning);">Import Command</button>
        <button class="btn-danger" id="clearBtn">Clear All Commands</button>
      </div>
      <input type="file" id="importFile" accept=".json">
    </div>
    
    <div class="warn-box" id="clearWarning" style="display: none; border-color: var(--danger); background: rgba(239, 83, 80, 0.1);">
      <strong style="color: var(--danger); display: block; margin-bottom: 8px;">⚠️ Are you sure?</strong>
      <p>This will delete all custom commands. This cannot be undone.</p>
      <div style="display: flex; gap: 12px; margin-top: 16px;">
        <button id="confirmClear" class="btn-danger">Yes, Delete All</button>
        <button id="cancelClear" class="btn-secondary">Cancel</button>
      </div>
    </div>

    <!-- Duplicate Modal -->
    <div class="modal" id="duplicateModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000; align-items:center; justify-content:center;">
      <div class="modal-content" style="width: 90%; max-width: 400px;">
        <h3>Duplicate Command</h3>
        <label for="duplicateName">Command Name</label>
        <input id="duplicateName" type="text" maxlength="32" />
        
        <label for="duplicateTemplate">Template</label>
        <textarea id="duplicateTemplate" readonly style="height: 100px; opacity: 0.7;"></textarea>
        
        <div style="display: flex; gap: 12px; margin-top: 16px;">
          <button id="saveDuplicate" class="btn-primary" style="flex: 1; background: var(--success);">Save</button>
          <button id="cancelDuplicate" class="btn-secondary" style="flex: 1;">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
